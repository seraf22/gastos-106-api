[build]
  base = "src/Casa106.Web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 5173

[[headers]]
  for = "/*"
  [headers.values]
	X-Frame-Options = "SAMEORIGIN"
	X-Content-Type-Options = "nosniff"
	X-XSS-Protection = "1; mode=block"
	Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
	Access-Control-Allow-Origin = "*"
